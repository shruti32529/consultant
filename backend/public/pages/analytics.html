<!DOCTYPE html>
<html>
<head>
    <title>Analytics - Consultation Manager</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .chart-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #182230;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-box .value {
            font-size: 32px;
            font-weight: bold;
        }

        .export-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .export-btn {
            padding: 10px 18px;
            background: #0b63ce;
            color: white;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .export-btn:hover {
            background: #084f9f;
            transform: translateY(-2px);
        }

        .export-btn.csv {
            background: #10b981;
        }

        .export-btn.csv:hover {
            background: #059669;
        }

        .export-btn.pdf {
            background: #ef4444;
        }

        .export-btn.pdf:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">
        <div>
            <h2>Consultations</h2>
        </div>

        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="add-consultation.html">Add Consultation</a>
        <a class="nav-link active" href="analytics.html">Analytics</a>
        <a class="nav-link" href="settings.html">Settings</a>

        <button class="secondary-button" onclick="logout()">Logout</button>
    </aside>

    <main class="main-panel">
        <section class="page-header">
            <div>
                <h1>📊 Analytics & Reports</h1>
                <p>Track your consultation statistics and performance</p>
            </div>
        </section>

        <section class="export-section">
            <h3>Export Data</h3>
            <div class="export-buttons">
                <button class="export-btn csv" onclick="exportToCSV()">📥 Export to CSV</button>
                <button class="export-btn pdf" onclick="exportToPDF()">📄 Export to PDF</button>
                <button class="export-btn" onclick="printReport()">🖨️ Print Report</button>
            </div>
        </section>

        <div class="analytics-grid">
            <div class="chart-card">
                <h3>Status Distribution</h3>
                <div class="chart-container">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Priority Breakdown</h3>
                <div class="chart-container">
                    <canvas id="priorityChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <h3>Payment Status</h3>
                <div class="chart-container">
                    <canvas id="paymentChart"></canvas>
                </div>
            </div>
        </div>

        <div class="analytics-grid">
            <div class="stat-box">
                <div class="label">Completion Rate</div>
                <div class="value" id="completionRate">0%</div>
            </div>

            <div class="stat-box">
                <div class="label">Collection Rate</div>
                <div class="value" id="collectionRate">0%</div>
            </div>

            <div class="stat-box">
                <div class="label">Avg. Consultation Time</div>
                <div class="value" id="avgTime">0 min</div>
            </div>
        </div>
    </main>
</div>

<script src="../js/analytics.js"></script>

</body>
</html>
