<!DOCTYPE html>
<html>
<head>
    <title>Payment Tracking - Consultation Manager</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .payment-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .payment-stat {
            background: white;
            padding: 18px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .payment-stat .label {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .payment-stat .amount {
            font-size: 28px;
            font-weight: bold;
            color: #182230;
        }

        .payment-table {
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .payment-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .payment-table thead {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .payment-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #182230;
            font-size: 13px;
        }

        .payment-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .payment-table tbody tr:hover {
            background: #f8fafc;
        }

        .payment-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-paid {
            background: #d1fae5;
            color: #065f46;
        }

        .status-partial {
            background: #fef3c7;
            color: #92400e;
        }

        .status-unpaid {
            background: #fee2e2;
            color: #991b1b;
        }

        .payment-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #f1f5f9;
            border-color: #667eea;
            color: #667eea;
        }

        .payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .payment-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #182230;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-primary {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            flex: 1;
            padding: 10px;
            background: #e5e7eb;
            color: #182230;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">
        <div>
            <h2>Consultations</h2>
        </div>

        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="add-consultation.html">Add Consultation</a>
        <a class="nav-link active" href="payments.html">Payments</a>
        <a class="nav-link" href="analytics.html">Analytics</a>

        <button class="secondary-button" onclick="logout()">Logout</button>
    </aside>

    <main class="main-panel">
        <section class="page-header">
            <div>
                <h1>💳 Payment Tracking</h1>
                <p>Monitor and manage consultation payments</p>
            </div>
            <button class="primary-link" onclick="openPaymentModal()">+ Record Payment</button>
        </section>

        <div class="payment-stats">
            <div class="payment-stat">
                <div class="label">Total Revenue</div>
                <div class="amount" id="totalRevenue">₹0</div>
            </div>
            <div class="payment-stat">
                <div class="label">Received</div>
                <div class="amount" id="paidAmount">₹0</div>
            </div>
            <div class="payment-stat">
                <div class="label">Pending</div>
                <div class="amount" id="pendingAmount">₹0</div>
            </div>
            <div class="payment-stat">
                <div class="label">Outstanding</div>
                <div class="amount" id="outstandingAmount">₹0</div>
            </div>
        </div>

        <div class="payment-table">
            <table>
                <thead>
                    <tr>
                        <th>Client Name</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #64748b;">No payments to display</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Payment Modal -->
<div class="payment-modal" id="paymentModal">
    <div class="modal-content">
        <h3>💰 Record Payment</h3>
        <form onsubmit="event.preventDefault(); recordPayment();">
            <div class="form-group">
                <label>Consultation</label>
                <select id="consultationSelect" required>
                    <option value="">Select a consultation</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount Received</label>
                <input type="number" id="amountReceived" placeholder="Enter amount" min="0" step="0.01" required>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <select id="paymentMethod" required>
                    <option value="Cash">Cash</option>
                    <option value="Card">Card</option>
                    <option value="UPI">UPI</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Cheque">Cheque</option>
                </select>
            </div>

            <div class="form-group">
                <label>Payment Date</label>
                <input type="date" id="paymentDate" required>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea id="paymentNotes" placeholder="Add any notes about this payment"></textarea>
            </div>

            <div class="modal-buttons">
                <button type="submit" class="btn-primary">Record Payment</button>
                <button type="button" class="btn-secondary" onclick="closePaymentModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/payments.js"></script>

</body>
</html>
