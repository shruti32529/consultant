<!DOCTYPE html>
<html>
<head>
    <title>Templates - Consultation Manager</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .template-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .template-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .template-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .template-card h3 {
            margin: 0;
            color: #182230;
            font-size: 18px;
        }

        .template-icon {
            font-size: 24px;
        }

        .template-description {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .template-actions {
            display: flex;
            gap: 8px;
        }

        .template-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .template-btn.use {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .template-btn.use:hover {
            background: #5568d3;
        }

        .template-btn.edit {
            color: #667eea;
        }

        .template-btn.edit:hover {
            background: #f1f5f9;
        }

        .template-btn.delete {
            color: #ef4444;
        }

        .template-btn.delete:hover {
            background: #fee2e2;
        }

        .add-template-section {
            background: white;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-template-section:hover {
            border-color: #667eea;
            background: #f8faff;
        }

        .add-template-section h3 {
            margin: 0 0 8px 0;
            color: #182230;
        }

        .add-template-section p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }

        .template-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .template-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .modal-content h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #182230;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn-primary {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: #e5e7eb;
            color: #182230;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .category-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #f1f5f9;
            color: #64748b;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">
        <div>
            <h2>Consultations</h2>
        </div>

        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="add-consultation.html">Add Consultation</a>
        <a class="nav-link active" href="templates.html">Templates</a>
        <a class="nav-link" href="analytics.html">Analytics</a>

        <button class="secondary-button" onclick="logout()">Logout</button>
    </aside>

    <main class="main-panel">
        <section class="page-header">
            <div>
                <h1>📋 Consultation Templates</h1>
                <p>Create and manage reusable consultation templates</p>
            </div>
            <button class="primary-link" onclick="openTemplateModal()">+ Create Template</button>
        </section>

        <div class="add-template-section" onclick="openTemplateModal()">
            <h3>➕ Create New Template</h3>
            <p>Click here to create a new consultation template for faster data entry</p>
        </div>

        <div class="templates-grid" id="templatesGrid">
            <!-- Templates will be loaded here -->
        </div>
    </main>
</div>

<!-- Template Modal -->
<div class="template-modal" id="templateModal">
    <div class="modal-content">
        <h2>📋 Create Consultation Template</h2>
        <form onsubmit="event.preventDefault(); saveTemplate();">
            <div class="form-group">
                <label>Template Name</label>
                <input type="text" id="templateName" placeholder="e.g., General Checkup" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="templateDescription" placeholder="Describe what this template is used for"></textarea>
            </div>

            <div class="form-group">
                <label>Default Notes</label>
                <textarea id="templateNotes" placeholder="Enter the default notes/prescription template"></textarea>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="templateCategory">
                    <option value="General">General Checkup</option>
                    <option value="Dental">Dental</option>
                    <option value="Vision">Vision</option>
                    <option value="Followup">Follow-up</option>
                    <option value="Emergency">Emergency</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Default Duration (minutes)</label>
                <input type="number" id="templateDuration" placeholder="30" min="5" step="5">
            </div>

            <div class="modal-buttons">
                <button type="submit" class="btn-primary">Save Template</button>
                <button type="button" class="btn-secondary" onclick="closeTemplateModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/templates.js"></script>

</body>
</html>
