<!DOCTYPE html>
<html>
<head>
    <title>Add Consultation - Consultation Manager</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 6px;
            font-weight: 600;
            color: #182230;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            grid-column: 1 / -1;
            min-height: 100px;
            resize: vertical;
        }

        .form-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .form-section h3 {
            margin-top: 0;
            margin-bottom: 16px;
            color: #182230;
            font-size: 16px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-save {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #e5e7eb;
            color: #182230;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel:hover {
            background: #d1d5db;
        }

        .quick-fill {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .quick-fill button {
            padding: 6px 12px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .quick-fill button:hover {
            background: #e2e8f0;
        }
    </style>
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">
        <div>
            <h2>Consultations</h2>
        </div>

        <a class="nav-link" href="dashboard.html">📊 Dashboard</a>
        <a class="nav-link active" href="add-consultation.html">➕ Add Consultation</a>
        <a class="nav-link" href="payments.html">💳 Payments</a>
        <a class="nav-link" href="templates.html">📋 Templates</a>
        <a class="nav-link" href="analytics.html">📈 Analytics</a>
        <a class="nav-link" href="settings.html">⚙️ Settings</a>

        <button class="secondary-button" onclick="logout()">Logout</button>
    </aside>

    <main class="main-panel">
        <section class="page-header">
            <div>
                <h1>➕ Add Consultation</h1>
                <p>Create a new consultation record</p>
            </div>
        </section>

        <form onsubmit="event.preventDefault(); addConsultation();">
            <!-- Client Information -->
            <div class="form-section">
                <h3>👤 Client Information</h3>
                <div class="quick-fill">
                    <button type="button" onclick="fillTemplateData()">📋 Load Template</button>
                </div>
                <div class="form-container">
                    <div class="form-group">
                        <label>Client Name *</label>
                        <input type="text" id="clientName" placeholder="Enter client name" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" placeholder="Enter phone number" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="patientEmail" placeholder="Enter email">
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" placeholder="Enter age" min="0" max="150">
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="Not Specified">Not Specified</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Address</label>
                        <textarea id="address" placeholder="Enter client address"></textarea>
                    </div>
                </div>
            </div>

            <!-- Consultation Details -->
            <div class="form-section">
                <h3>📋 Consultation Details</h3>
                <div class="form-container">
                    <div class="form-group">
                        <label>Consultation Date *</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option value="New">New</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Priority</label>
                        <select id="priority">
                            <option value="Normal">Normal</option>
                            <option value="High">High</option>
                            <option value="Urgent">Urgent</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Follow-up Date</label>
                        <input type="date" id="followUpDate">
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Clinical Notes</label>
                        <textarea id="notes" placeholder="Enter consultation notes"></textarea>
                    </div>
                </div>
            </div>

            <!-- Medical Information -->
            <div class="form-section">
                <h3>⚕️ Medical Information</h3>
                <div class="form-container">
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Diagnosis</label>
                        <textarea id="diagnosis" placeholder="Enter diagnosis"></textarea>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Prescription</label>
                        <textarea id="prescription" placeholder="Enter prescription details"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Recording/File</label>
                        <input type="file" id="recording" accept="audio/*,video/*,image/*,.pdf">
                    </div>
                </div>
            </div>

            <!-- Payment Information -->
            <div class="form-section">
                <h3>💰 Payment Information</h3>
                <div class="form-container">
                    <div class="form-group">
                        <label>Consultation Fee</label>
                        <input type="number" id="fee" placeholder="Enter fee" min="0" step="0.01">
                    </div>

                    <div class="form-group">
                        <label>Payment Status</label>
                        <select id="paymentStatus">
                            <option value="Unpaid">Unpaid</option>
                            <option value="Partial">Partial</option>
                            <option value="Paid">Paid</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn-save">💾 Save Consultation</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='dashboard.html'">Cancel</button>
            </div>
        </form>
    </main>
</div>

<script src="../js/addConsultation.js"></script>

</body>
</html>
